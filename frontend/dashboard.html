<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Flask Auth</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="dashboard-box">
            <h1>Welcome, <span id="userName">User</span>!</h1>
            <div class="profile-info">
                <h2>Your Profile</h2>
                <p><strong>Username:</strong> <span id="profileUsername"></span></p>
                <p><strong>Email:</strong> <span id="profileEmail"></span></p>
                <p><strong>Full Name:</strong> <span id="profileFullName"></span></p>
                <p><strong>Account Created:</strong> <span id="profileCreated"></span></p>
            </div>

            <div id="message"></div>

            <div class="actions">
                <button id="toggleEditProfile" class="btn btn-action">Edit Profile</button>
                <button id="toggleChangePassword" class="btn btn-action">Change Password</button>
            </div>

            <div id="editProfileSection" class="form-section" style="display: none;">
                <h2>Edit Profile</h2>
                <form id="editProfileForm">
                    <div class="input-group">
                        <label for="editUsername">Username</label>
                        <input type="text" id="editUsername" required placeholder="Enter username">
                    </div>
                    <div class="input-group">
                        <label for="editFullName">Full Name</label>
                        <input type="text" id="editFullName" placeholder="Enter full name">
                    </div>
                    <button type="submit" class="btn">Save Changes</button>
                    <button type="button" id="cancelEditProfile" class="btn btn-secondary">Cancel</button>
                </form>
            </div>

            <div id="changePasswordSection" class="form-section" style="display: none;">
                <h2>Change Password</h2>
                <form id="changePasswordForm">
                    <div class="input-group">
                        <label for="currentPassword">Current Password</label>
                        <input type="password" id="currentPassword" required placeholder="Enter current password">
                    </div>
                    <div class="input-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" required placeholder="Enter new password" minlength="6">
                    </div>
                    <div class="input-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" required placeholder="Confirm new password" minlength="6">
                    </div>
                    <button type="submit" class="btn">Update Password</button>
                    <button type="button" id="cancelChangePassword" class="btn btn-secondary">Cancel</button>
                </form>
            </div>

            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
